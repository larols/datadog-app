apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadog-app-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: datadog-app
      component: backend
  template:
    metadata:
      labels:
        app: datadog-app
        component: backend
      annotations:
        ad.datadoghq.com/datadog-app.logs: '[{"source":"python","service":"datadog-app-backend"}]'  # Added annotations here
    spec:
      containers:
      - name: datadog-app-backend  # Ensure this matches your container name
        image: laols/datadog-app-backend:latest  # Specify the Docker image here
        ports:
        - containerPort: 5000  # Adjust to the port your app listens on
        env:
        - name: DD_TRACE_AGENT_URL
          value: 'http://datadog-agent:8126'
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DD_TRACE_ENABLED
          value: "true"
        - name: DD_IAST_ENABLED
          value: "true"
        - name: DD_DYNAMIC_INSTRUMENTATION_ENABLED
          value: "true"
        - name: DD_RUNTIME_METRICS_ENABLED
          value: "true"
        - name: DD_PROFILING_ENABLED
          value: "true"
        - name: DD_ENV
          value: production
        - name: DD_SERVICE
          value: datadog-app-backend
        - name: DD_VERSION
          value: ""  # This will be updated later with the commit SHA
---
apiVersion: v1
kind: Service
metadata:
  name: datadog-app-backend-service
spec:
  selector:
    app: datadog-app
    component: backend
  ports:
    - protocol: TCP
      port: 5000  # Expose this port
      targetPort: 5000  # Ensure this matches the container port
  type: LoadBalancer