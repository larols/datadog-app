apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;

        location / {
            proxy_pass http://datadog-app-frontend;  # Use the frontend service name
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/views {
            proxy_pass http://datadog-app-views;  # Route to the views backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/uid {
            proxy_pass http://datadog-app-uid;  # Route to the UID backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
  status.conf: |
    server {
        listen 81;
        server_name localhost;

        access_log off;
        allow 127.0.0.1;
        allow 10.244.0.0/16;
        deny all;

        location /nginx_status {
            stub_status;  # or use 'status;' if you have NGINX Plus
            server_tokens on;
        }
    }