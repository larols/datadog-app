<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.datadoghq-browser-agent.com/eu1/v5/datadog-rum.js" type="text/javascript"></script>
    <script src="app.js"></script>
</head>
<body>
    <nav>
        <a href="/">Home</a> | 
        <a href="/about.html">About</a> | 
        <a href="/metrics.html">Metrics</a> | 
        <a href="/error.html">Simulate Server Error</a> | 
        <a href="/profile.html">User Profile</a>
    </nav>
    <div class="container">
        <h2>Metrics</h2>
        <p id="metrics-data">Loading metrics data...</p>
    </div>

    <script>
        // Fetch metrics data from the internal endpoint
        document.addEventListener('DOMContentLoaded', function() {
            const metricsUrl = '/internal-metrics'; // Internal endpoint in your Flask app

            fetch(metricsUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    const memoryInGiB = (data.memory / 1024 / 1024).toFixed(2); // Convert memory to GiB
                    document.getElementById('metrics-data').innerText = `CPU: ${data.cpu}%, Memory: ${memoryInGiB} GiB`;
                })
                .catch(error => {
                    console.error('Error fetching metrics:', error);
                    document.getElementById('metrics-data').innerText = 'Failed to load metrics data.';
                });
        });
    </script>
</body>
</html>
