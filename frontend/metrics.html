<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.datadoghq-browser-agent.com/eu1/v5/datadog-rum.js" type="text/javascript"></script>
    <script src="app.js"></script>
</head>
<body>
    <nav>
        <a href="/">Home</a> | 
        <a href="/about.html">About</a> | 
        <a href="/metrics.html">Metrics</a> | 
        <a href="/error.html">Simulate Server Error</a> | 
        <a href="/profile.html">User Profile</a> 
    </nav>
    <div class="container">
        <h2>Metrics</h2>
        <p id="metrics-data">Loading metrics data...</p>
    </div>

    <script>
        // Initialize Datadog RUM
        window.DD_RUM && window.DD_RUM.init({
            clientToken: 'pub9440fba958cca8c9313fa3b7061a338a',
            applicationId: '04a99ea4-d121-4f76-b731-f9514a177be0',
            site: 'datadoghq.eu',
            service: 'datadog-app-frontend',
            env: 'production',
            version: '1.0.0',
            sessionSampleRate: 100,
            sessionReplaySampleRate: 100,
            trackUserInteractions: true,
        });

        // Fetch metrics data from the backend
        document.addEventListener('DOMContentLoaded', function() {
            const metricsUrl = 'http://datadog-app-backend-service:5000/metrics'; // Use the service name to fetch metrics

            // Log the start of the metrics fetch
            window.DD_RUM.addAction('Fetching metrics', {
                url: metricsUrl,
            });

            fetch(metricsUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    // Convert memory from KiB to GiB
                    const memoryInGiB = (data.memory / 1024 / 1024).toFixed(2); // Convert to GiB
                    // Display the metrics data
                    document.getElementById('metrics-data').innerText = `CPU: ${data.cpu}%, Memory: ${memoryInGiB} GiB`;

                    // Log the successful fetch of metrics
                    window.DD_RUM.addAction('Metrics fetched successfully', {
                        cpu: data.cpu,
                        memory: memoryInGiB,
                    });
                })
                .catch(error => {
                    // Log the error
                    window.DD_RUM.addError(error.message);
                    document.getElementById('metrics-data').innerText = 'Failed to load metrics data.';
                });
        });
    </script>
</body>
</html>
