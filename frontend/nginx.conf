server {
    listen 80;
    server_name localhost;  # Adjust as needed

    client_header_buffer_size 1024k;  # Increase buffer size to 1024k
    large_client_header_buffers 4 1024k;  # Number of buffers and their size

    location / {
        root /usr/share/nginx/html;  # Path to your static files
        index index.html;  # Default file to serve
    }

    location /internal-metrics {
        proxy_pass http://datadog-app-backend-service:5000/metrics;  # Backend service
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}