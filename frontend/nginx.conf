http {
    client_header_buffer_size 16k;  # Increase as needed
    large_client_header_buffers 4 16k;  # Increase the number of buffers and their size

    server {
        listen 80;
        server_name localhost;  # Adjust as needed

        location / {
            proxy_pass http://datadog-app-frontend-service:80;  # Frontend service
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /internal-metrics {
            proxy_pass http://datadog-app-backend-service:5000/metrics;  # Backend service
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}