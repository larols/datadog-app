name: Build, Test, and Push Docker Image

on:
  push:
    branches:
      - main  # Trigger the workflow on push to the main branch
  pull_request:
    branches:
      - main  # Trigger the workflow on pull requests to the main branch

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest ddtrace

    - name: Run tests with Datadog monitoring
      env:
        DD_CIVISIBILITY_AGENTLESS_ENABLED: true
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
        DD_SITE: 'datadoghq.eu'
        DD_ENV: 'ci'
        DD_SERVICE: 'datadog-app-test'
      run: |
        pytest --ddtrace
      continue-on-error: true

  build-and-push:
    runs-on: ubuntu-latest
    needs: test  # Ensure this job runs only after the test job completes

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set commit sha for RUM version
      run: |
        # Extract the commit SHA
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        # Replace the placeholder VERSION in app.py with the commit SHA
        sed -i "s/version: 'VERSION'/version: '$VERSION'/g" app.py

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image with Datadog build args
      run: |
        # Get Git repository URL and commit SHA
        REPO_URL=$(git config --get remote.origin.url)
        COMMIT_SHA=$(git rev-parse HEAD)
        
        # Build Docker image with build arguments
        docker build . \
          -t ${{ secrets.DOCKER_USERNAME }}/datadog-app:latest \
          --build-arg DD_GIT_REPOSITORY_URL=${REPO_URL} \
          --build-arg DD_GIT_COMMIT_SHA=${COMMIT_SHA}

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/datadog-app:latest
