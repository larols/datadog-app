name: Build and Deploy nginx

on:
  push:
    branches:
      - main  # Adjust to your default branch
    paths:
      - 'nginx/**'      # Include nginx directory if you have changes there

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set commit sha for RUM version
      id: set_commit_sha
      run: |
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image for nginx
      run: |
        REPO_URL=$(git config --get remote.origin.url)
        COMMIT_SHA=$(git rev-parse HEAD)

        docker build -f nginx/Dockerfile nginx/ \
          -t ${{ secrets.DOCKER_USERNAME }}/datadog-app-nginx:latest \
          --build-arg DD_GIT_REPOSITORY_URL=${REPO_URL} \
          --build-arg DD_GIT_COMMIT_SHA=${COMMIT_SHA}

    - name: Push Docker image for nginx
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/datadog-app-nginx:latest

  deploy:
    name: Deploy to k8s
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 5

    env:
      DD_BETA_COMMANDS_ENABLED: 1
      DD_GITHUB_JOB_NAME: Deploy to k8s
      DD_SITE: datadoghq.eu
      DD_API_KEY: ${{ secrets.DD_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Tag pipeline in Datadog
      run: npx @datadog/datadog-ci tag --level pipeline --tags team:lars

    - name: Set deployment start time
      id: set_deploy_start
      run: echo "deploy_start=$(date +%s)" >> $GITHUB_ENV

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    - name: Deploy Frontend to Kubernetes
      run: |
        kubectl apply -f k8s/nginx-deployment.yaml --insecure-skip-tls-verify
        kubectl apply -f k8s/nginx-service.yaml --insecure-skip-tls-verify
        kubectl set env deployment/datadog-app-nginx DD_VERSION=${{ env.VERSION }} --insecure-skip-tls-verify

    - name: Deploy Nginx to Kubernetes
      run: |
        kubectl apply -f k8s/nginx-deployment.yaml --insecure-skip-tls-verify
        kubectl apply -f k8s/nginx-service.yaml --insecure-skip-tls-verify