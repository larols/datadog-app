name: Build, Test, and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set commit ID as version
        id: set-version
        run: echo "VERSION=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Update version in app.py
        run: |
          sed -i "s/version: 'ABC123'/version: '${{ env.VERSION }}'/g" app.py

      - name: Update DD_VERSION in deployment.yaml
        run: |
          sed -i "s/DD_VERSION: 'ABC123'/DD_VERSION: '${{ env.VERSION }}'/g" /k8s/deployment.yaml

      - name: Build Docker image
        run: docker build -t my-image:${{ env.VERSION }} .

      - name: Test Docker image
        run: docker run --rm my-image:${{ env.VERSION }} python -m unittest discover

      - name: Push Docker image to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push my-image:${{ env.VERSION }}

      - name: Deploy to Kubernetes
        uses: azure/setup-kubectl@v1
        with:
          version: 'latest'
        run: kubectl apply -f /k8s/deployment.yaml

      - name: Notify Datadog
        uses: datadog/datadog-ci@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          app-key: ${{ secrets.DD_APP_KEY }}
          command: datadog deployment create --version ${{ env.VERSION }} --description "Deployment of commit ${{ env.VERSION }}"
